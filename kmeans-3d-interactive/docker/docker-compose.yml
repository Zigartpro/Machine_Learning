version: "3.8"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kmeans-backend
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "False"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
    volumes:
      - ../backend:/app
    restart: unless-stopped
    networks:
      - kmeans-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    container_name: kmeans-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000
    restart: unless-stopped
    networks:
      - kmeans-network

networks:
  kmeans-network:
    driver: bridge
