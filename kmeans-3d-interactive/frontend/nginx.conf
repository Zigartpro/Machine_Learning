# ════════════════════════════════════════════════════════════
# CONFIGURACIÓN NGINX
# Ubicación: frontend/nginx.conf
# Descripción: Configuración para servir React SPA
# ════════════════════════════════════════════════════════════

server {
    # Puerto de escucha
    listen 80;
    server_name localhost;

    # Raíz de documentos (donde está la aplicación React compilada)
    root /usr/share/nginx/html;
    index index.html index.htm;

    # ════════════════════════════════════════════════════════════
    # RUTAS
    # ════════════════════════════════════════════════════════════

    # 1. Archivos estáticos (JS, CSS, imágenes, etc)
    location ~* ^.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Estos archivos casi nunca cambian, cachea por 1 año
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 2. API - Proxy al backend
    location /api/ {
        # Proxy reverso al servidor backend
        proxy_pass http://backend:5000;
        
        # Headers necesarios
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 3. Rutas de la aplicación React (SPA - Single Page Application)
    # Cualquier ruta que no sea un archivo estático, 
    # sirve index.html para que React maneje el routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ════════════════════════════════════════════════════════════
    # COMPRESIÓN
    # ════════════════════════════════════════════════════════════

    # Habilitar GZIP para comprimir respuestas
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/json 
        application/javascript 
        application/xml+rss 
        application/rss+xml 
        application/atom+xml 
        image/svg+xml 
        text/x-js 
        text/x-component 
        text/x-cross-domain-policy
        text/x-python
        text/x-java-source;

    # ════════════════════════════════════════════════════════════
    # SEGURIDAD
    # ════════════════════════════════════════════════════════════

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # ════════════════════════════════════════════════════════════
    # LOGS (opcional)
    # ════════════════════════════════════════════════════════════

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}

# ════════════════════════════════════════════════════════════
# NOTAS DE CONFIGURACIÓN
# ════════════════════════════════════════════════════════════
#
# 1. PROXY AL BACKEND:
#    - /api/* → http://backend:5000/api/*
#    - El nombre 'backend' viene de docker-compose
#
# 2. SPA ROUTING:
#    - React Router maneja todas las rutas
#    - Si la ruta no existe como archivo, sirve index.html
#
# 3. CACHÉ:
#    - Archivos estáticos se cachean por 1 año
#    - Los names con hash (React) no cambian si el contenido no cambia
#
# 4. COMPRESIÓN:
#    - GZIP reduce tamaño de respuestas hasta 70%
#
# 5. VARIABLES:
#    - $http_upgrade: Para WebSockets
#    - $proxy_add_x_forwarded_for: IP cliente real
#    - $scheme: http o https
# ════════════════════════════════════════════════════════════