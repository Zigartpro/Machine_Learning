version: "3.8"

services:
  # Backend - API FastAPI
  backend:
    build: ./backend
    container_name: knn-api-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/voter_intentions_3000.csv:/app/voter_intentions_3000.csv
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - knn-network

  # Frontend - Nginx sirviendo HTML
  frontend:
    image: nginx:alpine
    container_name: knn-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - knn-network

networks:
  knn-network:
    driver: bridge
